status = error
name = PropertiesConfig

# Console appender
appender.console.type = Console
appender.console.name = Console
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} %-5p %c{1}:%L - %m%n

# File appender
appender.file.type = File
appender.file.name = File
appender.file.fileName = logs/browser.log
appender.file.layout.type = PatternLayout
appender.file.layout.pattern = %d{yyyy-MM-dd HH:mm:ss} %-5p %c{1}:%L - %m%n

# Root logger
rootLogger.level = info
rootLogger.appenderRef.console.ref = Console
rootLogger.appenderRef.file.ref = File

# Application specific logger
logger.solace.name = com.solace.psg
logger.solace.level = debug
logger.solace.additivity = false
logger.solace.appenderRef.console.ref = Console
logger.solace.appenderRef.file.ref = File